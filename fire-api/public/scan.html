<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลถังดับเพลิง</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
        }

        .container { 
            background: white; 
            max-width: 480px; 
            width: 100%; 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        .header { 
            text-align: center; 
            border-bottom: 2px solid #f0f2f5; 
            padding-bottom: 20px; 
            margin-bottom: 20px; 
        }

        .header h2 { margin: 0; color: #d93025; font-size: 1.6em; }
        
        .id-badge {
            display: inline-block;
            background-color: #202124;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9em;
            margin-top: 10px;
            font-weight: 600;
        }

        /* ส่วนแสดงรูปภาพ */
        .photo-container {
            width: 100%;
            height: 220px;
            background-color: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #eee;
        }

        #f-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .no-photo-text { color: #bdc1c6; font-size: 0.9em; }

        /* แถวข้อมูล */
        .detail-card {
            background-color: #fff;
            border-radius: 12px;
        }

        .detail-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0;
            border-bottom: 1px solid #f8f9fa;
        }

        .detail-label { color: #5f6368; font-size: 0.95em; }
        .detail-value { color: #202124; font-weight: 600; text-align: right; }

        .status-pill {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.85em;
            color: white;
        }

        /* ส่วนเข้าสู่ระบบ */
        .login-section { 
            margin-top: 30px; 
            padding: 20px; 
            background-color: #f8f9fa;
            border-radius: 15px;
            text-align: center; 
        }

        .login-section h3 { margin-top: 0; color: #3c4043; font-size: 1.1em; }
        
        .login-section input { 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border: 1.5px solid #dadce0; 
            border-radius: 8px; 
            font-family: 'Sarabun'; 
            text-align: center; 
            font-size: 1.2em; 
            box-sizing: border-box;
        }

        .btn-check { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            font-size: 1.1em; 
            font-family: 'Sarabun'; 
            cursor: pointer; 
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-check:hover { background-color: #1765cc; }

        #loading { text-align: center; padding: 50px 0; color: #1a73e8; }
        #error-msg { text-align: center; color: #d93025; display: none; padding: 30px 0; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">
        <div style="font-size: 2em; margin-bottom: 10px;">⏳</div>
        กำลังโหลดข้อมูลถังดับเพลิง...
    </div>

    <div id="error-msg"></div>

    <div id="fire-details" style="display: none;">
        <div class="header">
            <h2>🧯 ข้อมูลถังดับเพลิง</h2>
            <div class="id-badge">ID: <span id="f-id"></span></div>
        </div>

        <div class="photo-container">
            <img id="f-photo" src="" alt="Fire Extinguisher">
            <div id="no-photo" class="no-photo-text">ไม่มีรูปภาพแสดงผล</div>
        </div>

        <div class="detail-card">
            <div class="detail-row"><span class="detail-label">ชนิด</span><span class="detail-value" id="f-type">-</span></div>
            <div class="detail-row"><span class="detail-label">ขนาด/น้ำหนัก</span><span class="detail-value" id="f-size-weight">-</span></div>
            <div class="detail-row"><span class="detail-label">สถานที่ติดตั้ง</span><span class="detail-value" id="f-location" style="color: #1a73e8;">-</span></div>
            <div class="detail-row"><span class="detail-label">วันบรรจุ (Fill Date)</span><span class="detail-value" id="f-fill">-</span></div>
            <div class="detail-row"><span class="detail-label">วันหมดอายุ</span><span class="detail-value" id="f-expire" style="color: #e67c73;">-</span></div>
            <div class="detail-row"><span class="detail-label">สถานะภาพรวม</span><span id="f-status-pill">-</span></div>
            <div class="detail-row"><span class="detail-label">สถานะเดือนนี้</span><span class="detail-value" id="f-month-status">-</span></div>
            <div class="detail-row" style="border:none;"><span class="detail-label">ตรวจล่าสุด</span><span class="detail-value" id="f-lastcheck">-</span></div>
        </div>

        <div class="login-section">
            <h3>👨‍🔧 ตรวจเช็คถังนี้</h3>
            <p style="font-size: 0.85em; color: #70757a; margin-top: -5px;">ระบุรหัสผ่านเพื่อบันทึกผลการตรวจ</p>
            <input type="password" id="staff-password" placeholder="••••" inputmode="numeric">
            <button class="btn-check" onclick="checkPassword()">เริ่มการตรวจเช็ค</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const fireId = urlParams.get('id');

    // ฟังก์ชันจัดรูปแบบวันที่ภาษาไทย
    function formatThaiDate(dateStr) {
        if (!dateStr || dateStr === '-') return '-';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr; 
        return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadFireData() {
        if (!fireId) {
            showError("❌ ไม่พบรหัสถังดับเพลิงใน URL");
            return;
        }

        try {
            // เรียก API จากเซิร์ฟเวอร์ตัวเอง
            const response = await fetch(`/api/fire/${fireId}`);
            const result = await response.json();

            if (result.success) {
                const data = result.data;
                
                document.getElementById('f-id').innerText = data.id;
                document.getElementById('f-type').innerText = data.type || '-';
                document.getElementById('f-size-weight').innerText = `${data.size || '-'} / ${data.weight || '-'}`;
                document.getElementById('f-location').innerText = data.location || '-';
                
                // แสดงวันบรรจุและวันหมดอายุ
                document.getElementById('f-fill').innerText = formatThaiDate(data.fillDate);
                document.getElementById('f-expire').innerText = formatThaiDate(data.expireDate);
                document.getElementById('f-lastcheck').innerText = data.lastCheckDate || 'ไม่มีประวัติ';

                // สถานะภาพรวม (เม็ดสี)
                const statusPill = document.getElementById('f-status-pill');
                const isReady = data.status === 'พร้อมใช้งาน';
                statusPill.innerHTML = `<span class="status-pill" style="background-color: ${isReady ? '#34a853' : '#ea4335'}">${data.status || 'ไม่ระบุ'}</span>`;

                // สถานะเดือนนี้
                const monthStatus = document.getElementById('f-month-status');
                monthStatus.innerText = data.currentMonthStatus || '-';
                monthStatus.style.color = data.currentMonthStatus === 'ตรวจแล้วเดือนนี้' ? '#34a853' : '#f29900';

                // การแสดงรูปภาพ
                const photoImg = document.getElementById('f-photo');
                const noPhoto = document.getElementById('no-photo');
                if (data.photoUrl && data.photoUrl.length > 5) {
                    photoImg.src = data.photoUrl;
                    photoImg.style.display = 'block';
                    noPhoto.style.display = 'none';
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('fire-details').style.display = 'block';
            } else {
                showError("❌ " + result.message);
            }
        } catch (error) {
            showError("❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
        }
    }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        const errDiv = document.getElementById('error-msg');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
    }

    function checkPassword() {
        const pass = document.getElementById('staff-password').value;
        if (pass === '1234') { 
            // นำทางไปยังหน้า check.html พร้อมส่ง ID ไปด้วย
            window.location.href = `check.html?id=${fireId}`;
        } else {
            alert("รหัสผ่านไม่ถูกต้อง");
            document.getElementById('staff-password').value = '';
        }
    }

    // รองรับการกด Enter เพื่อ Login
    document.getElementById('staff-password')?.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkPassword();
    });

    window.onload = loadFireData;
</script>

</body>
</html>
