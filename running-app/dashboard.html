<!DOCTYPE html>
<html lang="th" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            page: '#FCFBF9',       
            card: '#FFFFFF',       
            primary: '#33302E',    
            muted: '#9E9892',      
            accent: '#FC4C02',     
            borderLight: '#F3F0EC' 
          },
          fontFamily: {
            sans: ['Kanit', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          boxShadow: {
            'glow': '0 10px 30px -10px rgba(0,0,0,0.05)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Kanit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #FCFBF9; }
    
    /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Container ของกราฟให้ยืดหยุ่นตามหน้าจอ */
    .chart-container { position: relative; width: 100%; height: 100%; min-height: 220px; }
  </style>
</head>

<body class="bg-page text-primary dark:bg-[#121212] dark:text-gray-200 min-h-screen flex flex-col transition-colors duration-500 pb-20 md:pb-6">

  <nav class="w-full px-4 md:px-8 py-4 flex justify-between items-center z-50 sticky top-0 bg-page/90 dark:bg-[#121212]/90 backdrop-blur-md border-b border-borderLight dark:border-[#2A2A2A]">
    <div class="font-serif text-xl md:text-2xl font-semibold tracking-wide flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-accent inline-block"></span>
      ELITE <span class="text-muted font-light">DASHBOARD</span>
    </div>
    <div class="flex gap-2">
      <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-muted dark:text-gray-400">
        <span class="material-icons-round text-xl" id="themeIcon">dark_mode</span>
      </button>
    </div>
  </nav>

  <main class="flex-grow w-full max-w-7xl mx-auto px-4 md:px-8 py-6 flex flex-col gap-4 md:gap-6">

    <div class="grid grid-cols-2 xl:grid-cols-4 gap-3 md:gap-6">
      <div class="bg-card dark:bg-[#1E1E1E] p-4 md:p-6 rounded-[20px] md:rounded-[24px] text-center shadow-glow border border-borderLight dark:border-[#2A2A2A] flex flex-col justify-center">
        <div class="text-[24px] md:text-[32px] lg:text-[36px] font-bold text-primary dark:text-white leading-none mb-1 md:mb-2" id="totalDist">0.0</div>
        <div class="text-[9px] md:text-[11px] font-bold text-muted uppercase tracking-[0.1em]">Total KM</div>
      </div>
      <div class="bg-card dark:bg-[#1E1E1E] p-4 md:p-6 rounded-[20px] md:rounded-[24px] text-center shadow-glow border border-borderLight dark:border-[#2A2A2A] flex flex-col justify-center">
        <div class="text-[24px] md:text-[32px] lg:text-[36px] font-bold text-primary dark:text-white leading-none mb-1 md:mb-2" id="avgEF">-</div>
        <div class="text-[9px] md:text-[11px] font-bold text-muted uppercase tracking-[0.1em]">Avg Efficiency</div>
      </div>
      <div class="bg-card dark:bg-[#1E1E1E] p-4 md:p-6 rounded-[20px] md:rounded-[24px] text-center shadow-glow border border-accent flex flex-col justify-center relative overflow-hidden">
        <div class="absolute inset-0 bg-accent/5 dark:bg-accent/10"></div>
        <div class="text-[28px] md:text-[36px] lg:text-[42px] font-bold text-accent leading-none mb-1 md:mb-2 relative z-10" id="eliteScore">-</div>
        <div class="text-[9px] md:text-[11px] font-bold text-accent uppercase tracking-[0.1em] relative z-10">Elite Score</div>
      </div>
      <div class="bg-card dark:bg-[#1E1E1E] p-4 md:p-6 rounded-[20px] md:rounded-[24px] text-center shadow-glow border border-borderLight dark:border-[#2A2A2A] flex flex-col justify-center">
        <div class="text-[24px] md:text-[32px] lg:text-[36px] font-bold text-primary dark:text-white leading-none mb-1 md:mb-2" id="avgVR">-</div>
        <div class="text-[9px] md:text-[11px] font-bold text-muted uppercase tracking-[0.1em]">Vertical Ratio</div>
      </div>
    </div>

    <div class="bg-card dark:bg-[#1E1E1E] rounded-[20px] md:rounded-[32px] shadow-glow border border-borderLight dark:border-[#2A2A2A] overflow-hidden w-full flex flex-col">
      <div class="px-5 md:px-8 pt-5 md:pt-6 pb-3 border-b border-borderLight dark:border-[#2A2A2A] flex justify-between items-center">
        <h5 class="font-serif text-lg md:text-xl font-semibold text-primary dark:text-white">Biomechanics Progress</h5>
        <span class="text-[9px] md:text-[10px] px-2 py-1 md:px-3 bg-primary dark:bg-white text-white dark:text-primary rounded-full font-bold uppercase tracking-wider">Lab</span>
      </div>
      <div class="p-4 md:p-6 w-full flex-grow">
        <div class="chart-container h-[250px] md:h-[320px] w-full"><canvas id="biomechChart"></canvas></div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
      
      <div class="bg-card dark:bg-[#1E1E1E] rounded-[20px] md:rounded-[32px] shadow-glow border border-borderLight dark:border-[#2A2A2A] overflow-hidden flex flex-col">
        <div class="px-5 md:px-8 pt-5 md:pt-6 pb-3 border-b border-borderLight dark:border-[#2A2A2A]">
          <h5 class="font-semibold text-[15px] md:text-[16px] text-primary dark:text-white">Efficiency Factor</h5>
        </div>
        <div class="p-4 md:p-5 flex-grow">
          <div class="chart-container h-[200px] md:h-[240px] w-full"><canvas id="efChart"></canvas></div>
        </div>
      </div>

      <div class="bg-card dark:bg-[#1E1E1E] rounded-[20px] md:rounded-[32px] shadow-glow border border-borderLight dark:border-[#2A2A2A] overflow-hidden flex flex-col">
        <div class="px-5 md:px-8 pt-5 md:pt-6 pb-3 border-b border-borderLight dark:border-[#2A2A2A]">
          <h5 class="font-semibold text-[15px] md:text-[16px] text-primary dark:text-white">Weekly Volume</h5>
        </div>
        <div class="p-4 md:p-5 flex-grow">
          <div class="chart-container h-[200px] md:h-[240px] w-full"><canvas id="volChart"></canvas></div>
        </div>
      </div>

    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
      
      <div class="bg-card dark:bg-[#1E1E1E] rounded-[20px] md:rounded-[32px] shadow-glow border border-borderLight dark:border-[#2A2A2A] overflow-hidden flex flex-col">
        <div class="px-5 md:px-8 pt-5 md:pt-6 pb-3 border-b border-borderLight dark:border-[#2A2A2A]">
          <h5 class="font-semibold text-[15px] md:text-[16px] text-primary dark:text-white">Training Distribution</h5>
        </div>
        <div class="p-4 md:p-6 flex-grow flex items-center justify-center">
          <div class="chart-container h-[220px] md:h-[250px] w-full"><canvas id="distChart"></canvas></div>
        </div>
      </div>

      <div class="bg-card dark:bg-[#1E1E1E] rounded-[20px] md:rounded-[32px] shadow-glow border border-borderLight dark:border-[#2A2A2A] overflow-hidden flex flex-col">
        <div class="px-5 md:px-8 pt-5 md:pt-6 pb-3 border-b border-borderLight dark:border-[#2A2A2A] flex justify-between items-center">
          <h5 class="font-semibold text-[15px] md:text-[16px] text-primary dark:text-white">Recent Activities</h5>
          <button onclick="reload()" class="text-[10px] md:text-[11px] text-muted hover:text-primary dark:hover:text-white transition-colors flex items-center gap-1">
            <span class="material-icons-round text-[14px]">refresh</span> RELOAD
          </button>
        </div>
        <div class="w-full overflow-x-auto scrollbar-hide flex-grow p-1">
          <table class="w-full text-left border-collapse min-w-[350px]">
            <thead>
              <tr>
                <th class="text-[9px] md:text-[10px] font-bold text-muted uppercase tracking-[0.1em] px-4 py-3 border-b border-borderLight dark:border-[#2A2A2A]">Date</th>
                <th class="text-[9px] md:text-[10px] font-bold text-muted uppercase tracking-[0.1em] px-4 py-3 border-b border-borderLight dark:border-[#2A2A2A]">Type</th>
                <th class="text-[9px] md:text-[10px] font-bold text-muted uppercase tracking-[0.1em] px-4 py-3 border-b border-borderLight dark:border-[#2A2A2A]">Dist</th>
                <th class="text-[9px] md:text-[10px] font-bold text-muted uppercase tracking-[0.1em] px-4 py-3 border-b border-borderLight dark:border-[#2A2A2A]">Note</th>
              </tr>
            </thead>
            <tbody id="recentTableBody" class="text-[12px] md:text-[13px] divide-y divide-borderLight dark:divide-[#2A2A2A]">
              </tbody>
          </table>
        </div>
      </div>

    </div>

  </main>

  <a href="index.html" class="fixed bottom-6 right-6 md:bottom-8 md:right-8 w-12 h-12 md:w-14 md:h-14 bg-accent text-white rounded-full flex items-center justify-center shadow-lg shadow-accent/40 hover:scale-105 hover:shadow-accent/60 transition-all z-40 group">
    <span class="material-icons-round text-[24px] md:text-[28px] group-hover:rotate-90 transition-transform">add</span>
  </a>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxQcd1Sqt1-b2gZ8pwWJhs1Ye1nWK7mV_qNWOiVEKReWJvOGY_VeCFk-l0YL-Wh0AyW/exec";

    const html = document.documentElement;
    function toggleTheme() {
      const next = html.classList.contains('dark') ? 'light' : 'dark';
      if (next === 'dark') { html.classList.add('dark'); } else { html.classList.remove('dark'); }
      localStorage.setItem('elite_theme', next);
      document.getElementById('themeIcon').innerText = next === 'dark' ? 'light_mode' : 'dark_mode';
      updateChartsTheme(next);
    }
    
    const saved = localStorage.getItem('elite_theme') || 'light';
    if (saved === 'dark' || (!localStorage.getItem('elite_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
      document.getElementById('themeIcon').innerText = 'light_mode';
    } else {
      document.getElementById('themeIcon').innerText = 'dark_mode';
    }

    function updateChartsTheme(theme) {
      const color = theme === 'dark' ? '#E0E0E0' : '#33302E';
      const grid = theme === 'dark' ? '#2A2A2A' : '#F3F0EC';
      Chart.defaults.color = color;
      Chart.defaults.borderColor = grid;
      Chart.defaults.font.family = "'Kanit', sans-serif";
      [efC, volC, distC, biomechC].forEach(c => c && c.update());
    }

    let efC, volC, distC, biomechC;

    window.onload = async function() {
      await reload();
      updateChartsTheme(html.classList.contains('dark') ? 'dark' : 'light');
    };

    // ฟังชั่นจับขนาดจอเพื่อปรับ Legend ของกราฟวงกลม
    function getLegendPosition() {
      return window.innerWidth < 768 ? 'bottom' : 'right';
    }

    // จับ Event เมื่อมีการหมุนจอ หรือย่อขยายหน้าต่าง
    window.addEventListener('resize', () => {
      if (distC) {
        distC.options.plugins.legend.position = getLegendPosition();
        distC.update();
      }
    });

    async function reload() {
      const tbody = document.getElementById('recentTableBody');
      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-muted text-sm"><span class="material-icons-round animate-spin align-middle">sync</span> Loading...</td></tr>';

      try {
        const res = await fetch(API_URL, { method: "GET" });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = []; }

        if (Array.isArray(data) && data.length > 0) {
          renderDashboard(data);
        } else {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-muted text-sm">No activities found.</td></tr>';
          document.getElementById('totalDist').innerText = "0.0";
          document.getElementById('avgEF').innerText = "-";
          document.getElementById('avgVR').innerText = "-";
          document.getElementById('eliteScore').innerText = "-";
          [efC, volC, distC, biomechC].forEach(c => c && c.destroy());
          efC = volC = distC = biomechC = null;
        }
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-400 text-sm">Error: ${escapeHtml(err.message)}</td></tr>`;
      }
    }

    function renderDashboard(data) {
      let chartData = [...data].sort((a,b) => Number(a[0]) - Number(b[0]));

      let km=0, efSum=0, efCount=0;
      let dates=[], ef=[], vol={};
      let typeCounts = { 'Easy':0, 'Tempo':0, 'Interval':0, 'Long':0, 'Race':0, 'Other':0 };
      let biomechDates = [], vertData = [], strideData = [], gctData = [];
      let totalVR = 0, vrCount = 0;
      let totalScore = 0, scoreCount = 0;

      chartData.forEach(r => {
        const ts = Number(r[0]); if(!ts) return;
        const type = r[1] || 'Other';
        const d = parseFloat(r[2])||0;
        const hr = parseInt(r[5])||0;
        const pwr = parseInt(r[6])||0;

        const vOsc = parseFloat(r[10]) || 0;
        const gct = parseInt(r[11]) || 0;
        const sLen = parseFloat(r[12]) || 0;

        km += d;

        if(hr>0 && pwr>0) {
          efSum += (pwr/hr);
          efCount++;
          dates.push(formatDate(ts));
          ef.push(Number((pwr/hr).toFixed(2)));
        }

        const wk = getWeek(new Date(ts));
        vol[wk] = (vol[wk]||0)+d;

        if(typeCounts[type] !== undefined) typeCounts[type]++; else typeCounts['Other']++;

        if(vOsc > 0 && sLen > 0) {
          let vr = (vOsc / sLen);
          totalVR += vr;
          vrCount++;

          if(gct > 0) {
            let vrScore = 50 - Math.max(0, (vr - 7.5) * 5);
            let gctScore = 50 - Math.max(0, (gct - 230) * 0.5);
            let runScore = Math.max(0, Math.min(100, vrScore + gctScore));
            totalScore += runScore;
            scoreCount++;
          }
        }

        if(vOsc > 0 || sLen > 0 || gct > 0) {
          biomechDates.push(formatDate(ts));
          vertData.push(vOsc);
          gctData.push(gct);
          strideData.push(sLen);
        }
      });

      document.getElementById('totalDist').innerText = km.toFixed(1);
      document.getElementById('avgEF').innerText = efCount>0 ? (efSum/efCount).toFixed(2) : '-';
      document.getElementById('avgVR').innerText = vrCount > 0 ? (totalVR / vrCount).toFixed(1) + '%' : '-';
      document.getElementById('eliteScore').innerText = scoreCount > 0 ? Math.round(totalScore / scoreCount) : '-';

      const common = {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } }, // ลดจำนวนแกน X ในมือถือ
          y: { beginAtZero: false, grid: { borderDash: [4, 4] } }
        }
      };

      if(volC) volC.destroy();
      volC = new Chart(document.getElementById('volChart'), {
        type: 'bar',
        data: {
          labels: Object.keys(vol).sort(),
          datasets: [{
            data: Object.keys(vol).sort().map(k => vol[k]),
            backgroundColor: html.classList.contains('dark') ? '#404040' : '#E0E0E0',
            hoverBackgroundColor: '#FC4C02',
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: { ...common, scales: { x: { grid: {display: false}, ticks: { maxTicksLimit: 8 } }, y: { beginAtZero: true, grid: { borderDash: [4, 4] } } } }
      });

      if(efC) efC.destroy();
      efC = new Chart(document.getElementById('efChart'), {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            data: ef,
            borderColor: '#FC4C02',
            backgroundColor: 'rgba(252,76,2,0.05)',
            borderWidth: 2,
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#FC4C02',
            pointRadius: 0,
            pointHoverRadius: 5
          }]
        },
        options: common
      });

      if(biomechC) biomechC.destroy();
      biomechC = new Chart(document.getElementById('biomechChart'), {
        type: 'line',
        data: {
          labels: biomechDates,
          datasets: [
            { label: 'Vert Osc (cm)', data: vertData, borderColor: '#3b82f6', backgroundColor: '#3b82f6', yAxisID: 'y', tension: 0.4, pointRadius: 2, borderWidth: 2 },
            { label: 'Stride (m)', data: strideData, borderColor: '#10b981', backgroundColor: '#10b981', yAxisID: 'y1', tension: 0.4, pointRadius: 2, borderWidth: 2 },
            { label: 'GCT (ms)', data: gctData, borderColor: '#f43f5e', backgroundColor: '#f43f5e', yAxisID: 'y2', tension: 0.4, pointRadius: 2, borderWidth: 2 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'top', labels: { boxWidth: 8, usePointStyle: true, font: { size: window.innerWidth < 768 ? 10 : 12 } } },
            tooltip: { mode: 'index', intersect: false, backgroundColor: 'rgba(0,0,0,0.8)' }
          },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
            y: { type: 'linear', display: true, position: 'left', grid: { borderDash: [4,4] }, title: { display: true, text: 'Osc (cm)', font: { size: 10 } } },
            y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: window.innerWidth >= 768, text: 'Stride (m)', font: { size: 10 } } }, // ซ่อนแกนขวาในมือถือเพื่อประหยัดพื้นที่
            y2: { type: 'linear', display: false, position: 'right' }
          }
        }
      });

      if(distC) distC.destroy();
      distC = new Chart(document.getElementById('distChart'), {
        type: 'doughnut',
        data: {
          labels: ['Easy', 'Tempo', 'Interval', 'Long', 'Race'],
          datasets: [{
            data: [typeCounts.Easy, typeCounts.Tempo, typeCounts.Interval, typeCounts.Long, typeCounts.Race],
            backgroundColor: ['#10b981', '#f59e0b', '#f43f5e', '#3b82f6', '#8b5cf6'],
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '75%',
          plugins: { legend: { position: getLegendPosition(), labels: { boxWidth: 10, usePointStyle: true, font: { size: 11 } } } }
        }
      });

      // Recent table
      let recentData = [...data].sort((a,b) => Number(b[0]) - Number(a[0])).slice(0, 5);
      let rowsHTML = '';
      recentData.forEach(r => {
        let type = r[1] || 'Run';
        
        let badgeStyle = type==='Easy' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 
                         type==='Tempo' ? 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400' : 
                         type==='Interval' ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400' : 
                         'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400';

        rowsHTML += `<tr class="group hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
          <td class="px-4 py-3 whitespace-nowrap text-primary dark:text-gray-200">${formatDate(r[0])}</td>
          <td class="px-4 py-3 whitespace-nowrap"><span class="px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold tracking-wide uppercase ${badgeStyle}">${escapeHtml(type)}</span></td>
          <td class="px-4 py-3 whitespace-nowrap"><strong class="text-primary dark:text-white">${escapeHtml(String(r[2] ?? '-'))}</strong> <span class="text-[9px] text-muted ml-0.5">KM</span></td>
          <td class="px-4 py-3 text-muted truncate max-w-[120px] md:max-w-[200px] font-light">${escapeHtml(String(r[8] ?? '-'))}</td>
        </tr>`;
      });
      document.getElementById('recentTableBody').innerHTML = rowsHTML;

      updateChartsTheme(html.classList.contains('dark') ? 'dark' : 'light');
    }

    function formatDate(ts) { return new Date(Number(ts)).toLocaleDateString('th-TH', {day:'numeric', month:'short'}); }

    function getWeek(d) {
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
      var y = new Date(Date.UTC(d.getUTCFullYear(),0,1));
      return `${d.getFullYear()}-W${String(Math.ceil((((d-y)/86400000)+1)/7)).padStart(2,'0')}`;
    }

    function escapeHtml(s){
      return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
  </script>
</body>
</html>
